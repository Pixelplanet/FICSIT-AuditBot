services:
  ficsit-auditbot:
    build: .
    image: pixelplanet/ficsit-auditbot:latest
    container_name: ficsit-auditbot
    restart: unless-stopped
    ports:
      # Host:Container — open http://localhost:8080 for the web UI.
      - "8080:8080"
    environment:
      # Paths are baked into the image: DATA_DIR=/data, SAVES_DIR=/saves.
      WEB_PORT: "8080"
      WEB_ENABLED: "true"
      # Polling is more reliable for save changes across bind mounts.
      WATCH_USE_POLLING: "true"
      WATCH_DEBOUNCE_MS: "5000"
      # Dedicated servers often rotate autosaves while _continue stays stale,
      # so track the newest .sav file by default.
      CANONICAL_SAVE_SUFFIX: ".sav"
      # Start in preview-only mode; flip to true (or use the web UI) to post.
      POST_TO_DISCORD: "false"
      SKIP_EMPTY_SUMMARIES: "true"
      # Optionally set Discord credentials here, or configure them in the web UI.
      # DISCORD_WEBHOOK_URL: ""
      # DISCORD_BOT_TOKEN: ""
      # DISCORD_CHANNEL_ID: ""
    volumes:
      # One internal data folder: holds state/ (snapshots, db.json, config.json)
      # and an optional docs/ subfolder (drop Docs.json / en-US.json there).
      - ./data:/data
      # Mount your Satisfactory saves folder (read-only) into the container.
      # For local debugging this points at the bundled ./Saves folder; point it
      # at your real server save directory for production-like testing.
      - ./Saves:/saves:ro
