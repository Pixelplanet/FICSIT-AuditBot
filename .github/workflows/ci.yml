# =============================================================================
# CI — Build the FICSIT AuditBot image and push it to DockerHub
# =============================================================================
# Self-contained: builds the Docker image and pushes it to DockerHub on every
# push to main. (No longer depends on the shared Pixelplanet/lasertools
# reusable workflow.)
#
# Required repository secrets:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# =============================================================================

name: CI

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: pixelplanet/ficsit-auditbot
  # Run the JavaScript actions below on Node.js 24 (they ship on Node 20, which
  # GitHub is deprecating). Opting in now silences the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
