# =============================================================================
# CI — Build the FICSIT AuditBot image and push it to DockerHub
# =============================================================================
# Reuses the shared, reusable build workflow hosted in Pixelplanet/lasertools so
# the build + push logic stays in one place across all repos.
#
# Required secrets (repo-level on this repo, or organization-level shared):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# =============================================================================

name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    uses: Pixelplanet/lasertools/.github/workflows/docker-build.yml@main
    with:
      image-name: pixelplanet/ficsit-auditbot
      context-path: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
