# =============================================================================
# FICSIT AuditBot — Portainer / production deployment
# =============================================================================
# Pulls the prebuilt image from DockerHub (no local build).
#
# Storage is intentionally simple to avoid Portainer variable-substitution
# issues with bind paths:
#   * ONE named volume  → /data   (holds state/ and docs/ subfolders)
#   * ONE bind mount     → /saves  (the Satisfactory server's save folder, RO)
#
# The ONLY line you may need to edit is the saves bind source below if your
# server stores saves somewhere other than the default path.
#
# Deploy in Portainer:
#   1. Stacks → Add stack → Web editor, paste this file.
#   2. (Optional) Environment variables → Load variables from .env file, upload
#      your .env to set Discord credentials / behaviour. Paths need NO env vars.
#   3. Deploy.
# =============================================================================

services:
  ficsit-auditbot:
    image: pixelplanet/ficsit-auditbot:latest
    container_name: ficsit-auditbot
    restart: unless-stopped
    ports:
      # Web UI — http://<host>:8080
      - "8080:8080"
    environment:
      # Paths are baked into the image (DATA_DIR=/data, SAVES_DIR=/saves);
      # only behaviour + Discord are configurable here (optional via .env).
      POST_TO_DISCORD: "${POST_TO_DISCORD:-false}"
      SKIP_EMPTY_SUMMARIES: "${SKIP_EMPTY_SUMMARIES:-true}"
      WATCH_DEBOUNCE_MS: "${WATCH_DEBOUNCE_MS:-5000}"
      PHASE_COST_MULTIPLIER: "${PHASE_COST_MULTIPLIER:-0}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_CHANNEL_ID: "${DISCORD_CHANNEL_ID:-}"
    volumes:
      # All app data (state + docs subfolders) on one managed volume.
      - ficsit-auditbot-data:/data
      # The Satisfactory dedicated-server saves (read-only). Edit this host
      # path if your saves live elsewhere.
      - /mnt/docker_data/satisfactory/saved/server:/saves:ro

volumes:
  ficsit-auditbot-data:
