# =============================================================================
# FICSIT AuditBot — Portainer / production deployment
# =============================================================================
# Pulls the prebuilt image from DockerHub (no local build) and mounts the
# dedicated-server save directory plus a dedicated app data folder.
#
# Deploy in Portainer:
#   1. Stacks → Add stack → Web editor, and paste this file.
#   2. Under "Environment variables", click "Load variables from .env file"
#      and upload the .env next to this file (see .env.example).
#   3. Deploy. Update the image later by re-pulling and recreating the stack.
#
# Host paths (override in .env):
#   SAVES_HOST_DIR  → the server's Satisfactory save folder (read-only)
#   STATE_HOST_DIR  → app state (snapshots + db.json + config.json)
#   DOCS_HOST_DIR   → optional game Docs.json/en-US.json folder (read-only)
# =============================================================================

services:
  ficsit-auditbot:
    image: pixelplanet/ficsit-auditbot:latest
    container_name: ficsit-auditbot
    restart: unless-stopped
    ports:
      # Web UI — http://<host>:<WEB_PORT>
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    environment:
      SAVES_DIR: /data/saves
      STATE_DIR: /app/state
      DOCS_PATH: /data/docs
      WEB_PORT: "${WEB_PORT:-8080}"
      WEB_ENABLED: "true"
      # Polling is more reliable for save changes across bind mounts.
      WATCH_USE_POLLING: "true"
      WATCH_DEBOUNCE_MS: "${WATCH_DEBOUNCE_MS:-5000}"
      POST_TO_DISCORD: "${POST_TO_DISCORD:-false}"
      SKIP_EMPTY_SUMMARIES: "${SKIP_EMPTY_SUMMARIES:-true}"
      PHASE_COST_MULTIPLIER: "${PHASE_COST_MULTIPLIER:-0}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_CHANNEL_ID: "${DISCORD_CHANNEL_ID:-}"
    volumes:
      # Satisfactory dedicated-server saves (read-only — we only ever read them).
      - "${SAVES_HOST_DIR:-/mnt/docker_data/satisfactory/saved/server}:/data/saves:ro"
      # Persistent app state across restarts (snapshots, db.json, config.json).
      - "${STATE_HOST_DIR:-/mnt/docker_data/ficsit-auditbot/state}:/app/state"
      # Optional game docs for real names + unlocks (read-only). Drop a
      # Docs.json / en-US.json (or the whole CommunityResources folder) here.
      - "${DOCS_HOST_DIR:-/mnt/docker_data/ficsit-auditbot/docs}:/data/docs:ro"
